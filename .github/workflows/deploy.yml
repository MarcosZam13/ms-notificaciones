name: Build & Deploy — ms-notificaciones

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy a Azure App Service

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Empaquetar para deploy
        run: |
          zip -r deploy.zip . \
            --exclude "*.git*" \
            --exclude "__pycache__/*" \
            --exclude "*.pyc" \
            --exclude ".env*" \
            --exclude "*.log" \
            --exclude "deploy-notificaciones.zip"

      - name: Deploy a Azure App Service via Kudu ZIP API
        env:
          KUDU_CREDENTIALS: ${{ secrets.KUDU_CREDENTIALS_MS_NOTIFICACIONES }}
        run: |
          curl -X POST \
            "https://ms-notificaciones.scm.azurewebsites.net/api/zipdeploy?isAsync=false" \
            -u "$KUDU_CREDENTIALS" \
            -H "Content-Type: application/zip" \
            --data-binary @deploy.zip \
            --fail \
            --show-error \
            --silent \
            -w "\nHTTP status: %{http_code}\n"
